<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四川天一学院 - 人物介绍</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden; 
            background-color: #f5f5f5;
        }

        /* 核心修改：背景层 - 纯图片，不加模糊 */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('1001001604.jpg') center/cover no-repeat;
            z-index: -2;
        }

        /* 核心修改：用半透明的纯白色遮罩层实现背景“淡化”效果 */
        .bg-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 这里的 0.75 是淡化程度。如果你觉得背景太亮，可以改小（比如 0.6）；觉得背景干扰了文字，可以改大（比如 0.85） */
            background-color: rgba(255, 255, 255, 0.75); 
            z-index: -1;
        }

        /* 顶部 Logo */
        .header {
            width: 100%;
            text-align: center;
            padding-top: 8vh;
            z-index: 10;
            position: relative;
        }

        .header img {
            width: 90px; 
            height: 90px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            background-color: #fff;
        }

        /* Swiper 容器 */
        .swiper {
            width: 100%;
            padding-top: 5vh;
            padding-bottom: 30px;
        }

        .swiper-slide {
            width: 65vw; 
            height: 55vh; 
            max-height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            background-color: #fff;
        }

        .swiper-slide:not(.swiper-slide-active) {
            transform: scale(0.85);
            opacity: 0.6;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* 姓名牌绝对居中 */
        .name-badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.55);
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 15px;
            letter-spacing: 1px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 提示文字 */
        .hint {
            text-align: center;
            color: #333;
            margin-top: 10px;
            font-size: 13px;
            font-weight: bold;
            position: relative;
            z-index: 10;
        }

        /* 弹窗及毛玻璃效果 */
        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85); /* 弹窗底色稍微调白一点，增加阅读清晰度 */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            max-height: 75vh;
            overflow-y: auto;
            color: #333;
            position: relative;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #111;
            text-align: center;
        }

        .modal-content p {
            line-height: 1.7;
            font-size: 15px;
            text-align: justify;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="header">
        <img src="1001001603.jpg" alt="Logo">
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide" data-id="1">
                <img src="person1.jpg" alt="包娜巧">
                <div class="name-badge">包娜巧</div>
            </div>
            <div class="swiper-slide" data-id="2">
                <img src="person2.jpg" alt="万小松">
                <div class="name-badge">万小松</div>
            </div>
            <div class="swiper-slide" data-id="3">
                <img src="person3.jpg" alt="孔繁慧">
                <div class="name-badge">孔繁慧</div>
            </div>
        </div>
    </div>
    
    <div class="hint">👈 左右滑动，双击人物查看详情 👉</div>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <a href="javascript:void(0)" class="close-btn" id="closeBtn">&times;</a>
            <h2 id="modalName">名字</h2>
            <p id="modalDesc">介绍内容...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const personsData = {
            "1": {
                name: "包娜巧",
                desc: "包娜巧，女，中共党员，讲师，工程师，“双师型”教师。毕业于长沙理工大学汽车运用工程专业，曾在汽车企业担任售后服务顾问、服务经理、保险部经理、新媒体销售负责人等工作。2021年到2025年共参研课题5个，发表论文4篇，参编教材1部，2021年带领学生参加四川省新能源汽车技能大赛，获得“三等奖”，2023年参加川渝毗邻地区技能人才大赛新能源汽车电控技术，获得职工组“三等奖”，2024年带领学生参加汽车流通协会组织的汽车营销比赛获得“三等奖”，2024年参加全国职业院校汽车专业教师技能大赛-汽车检测与维修赛项获得“三等奖”，2025年参加学校教师风采大赛获得“二等奖”。"
            },
            "2": {
                name: "万小松",
                desc: "万小松，男，土家族，中共党员，毕业于西南交通大学希望学院，本科，学士学位；先后在四川希望汽车职业学院、四川五月花技师学院担任辅导员，现为四川天一学院工程学院党总支副书记，有着丰富的学生管理工作经验；工作中始终将贴近学生、了解学生作为自己学生工作的基本要求，深入细致了解学生，关心学生爱护学生，在学生中有较好的口碑和感召力。"
            },
            "3": {
                name: "孔繁慧",
                desc: "孔繁慧，副教授，中共党员，博士在读，四川天一学院工程学院副院长、工程测量教研室主任，注册全国监理工程师、建造师。从事教学工作10余年，主要承担工程测量、建筑项目管理、工程经济、混凝土结构平法识图、建设法规等课程的理论和实践教学工作。曾荣获第八届全国高等院校学生“斯维尔杯”建筑信息模型（BIM）应用技能大赛优秀指导教师、全国高等院校建筑软件技能认证大赛--BIM算量赛大赛优秀指导教师、四川省高职院校“徕拓.中纬”杯测绘技能大赛优秀指导教师和“希望杯”职业规划大赛指导教师三等奖等、教学技能大赛二等奖等。连续五年荣获四川天一学院优秀共产党员和年度考核先进个人，同时荣获首届中青年骨干教师、校级和集团优秀教师的荣誉称号。"
            }
        };

        const swiper = new Swiper(".mySwiper", {
            slidesPerView: 'auto', 
            centeredSlides: true,  
            spaceBetween: 20,     
            loop: true,           
            slideToClickedSlide: true 
        });

        const modal = document.getElementById('infoModal');
        const modalName = document.getElementById('modalName');
        const modalDesc = document.getElementById('modalDesc');
        const closeBtn = document.getElementById('closeBtn');

        function openModal(id) {
            const data = personsData[id];
            if(data) {
                modalName.innerText = data.name;
                modalDesc.innerText = data.desc;
                modal.classList.add('show');
            }
        }

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        let lastTapTime = 0;
        
        document.querySelector('.swiper-wrapper').addEventListener('touchend', function(e) {
            const slide = e.target.closest('.swiper-slide');
            if(!slide) return;
            
            if(!slide.classList.contains('swiper-slide-active')) return;

            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            
            if (tapLength < 400 && tapLength > 0) {
                let realId = slide.getAttribute('data-swiper-slide-index') || slide.getAttribute('data-id');
                if (slide.hasAttribute('data-swiper-slide-index')) {
                    realId = parseInt(realId) + 1;
                }
                openModal(realId.toString());
                e.preventDefault(); 
            }
            lastTapTime = currentTime;
        });

        document.querySelector('.swiper-wrapper').addEventListener('dblclick', function(e) {
            const slide = e.target.closest('.swiper-slide');
            if(!slide) return;

            if(slide.classList.contains('swiper-slide-active')) {
                let realId = slide.getAttribute('data-swiper-slide-index') || slide.getAttribute('data-id');
                if (slide.hasAttribute('data-swiper-slide-index')) {
                    realId = parseInt(realId) + 1;
                }
                openModal(realId.toString());
            }
        });
    </script>
</body>
</html>
