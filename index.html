<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四川天一学院 - 人物介绍</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            background: #0a0a0a;
        }

        /* 核心修改：添加了备选背景渐变，图片加载失败时也保持美观 */
        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                url('1001001604.jpg') center/cover no-repeat,
                linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); 
            filter: blur(20px) brightness(0.6); 
            transform: scale(1.15); 
            z-index: -1;
            transition: background-image 0.6s ease;
        }
        .bg-layer::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
        }

        .header {
            flex-shrink: 0; display: flex; justify-content: center; align-items: center;
            padding-top: 20px; height: 90px; z-index: 10; position: relative;
        }
        .header img {
            width: 72px; height: 72px; border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 3px rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }
        .header img:active { transform: scale(0.92); }

        .swiper { flex-grow: 1; width: 100%; height: 0; }
        .swiper-wrapper { align-items: center; }

        .swiper-slide {
            width: 70%; height: auto;
            aspect-ratio: 4 / 5;
            max-height: 480px; max-width: 320px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 18px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity 0.35s ease,
                        box-shadow 0.35s ease;
        }
        .swiper-slide:not(.swiper-slide-active) {
            transform: scale(0.82); opacity: 0.5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .swiper-slide-active {
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }

        .swiper-slide img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .swiper-slide-active img { transform: scale(1); }

        .slide-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            pointer-events: none;
        }

        .name-badge {
            position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 6px 20px; border-radius: 25px;
            font-size: 16px; font-weight: 500; letter-spacing: 1px;
            pointer-events: none; white-space: nowrap;
        }

        .hint {
            flex-shrink: 0; text-align: center; color: rgba(255,255,255,0.7);
            height: 44px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; position: relative; z-index: 10;
            letter-spacing: 0.5px;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; justify-content: center; align-items: center; padding: 20px;
            background: rgba(0,0,0,0);
            transition: background 0.3s ease;
        }
        .modal.show {
            display: flex;
            background: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease forwards;
        }
        .modal.hiding {
            display: flex;
            background: rgba(0,0,0,0);
            animation: fadeOut 0.25s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .modal-content {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border-radius: 22px; padding: 35px 24px 28px; width: 100%; max-width: 400px;
            max-height: 70vh; overflow-y: auto; color: #fff; position: relative;
            transform: translateY(30px) scale(0.95); opacity: 0;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }
        .modal.show .modal-content {
            transform: translateY(0) scale(1); opacity: 1;
        }
        .modal.hiding .modal-content {
            transform: translateY(20px) scale(0.95); opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .modal-content h2 {
            margin-bottom: 16px; color: #fff; text-align: center;
            font-size: 22px; font-weight: 600; letter-spacing: 2px;
        }
        .modal-content p {
            line-height: 1.8; font-size: 15px; text-align: justify;
            color: rgba(255,255,255,0.9);
        }
        .close-btn {
            position: absolute; top: 12px; right: 16px;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; color: rgba(255,255,255,0.8);
            text-decoration: none; transition: background 0.2s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .close-btn:hover { background: rgba(255,255,255,0.3); }

        .modal-content::-webkit-scrollbar { width: 4px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        body.modal-open { overflow: hidden; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="header"><img src="1001001603.jpg" alt="Logo"></div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide" data-id="1">
                <img src="person1.jpg" alt="包娜巧">
                <div class="slide-overlay"></div>
                <div class="name-badge">包娜巧</div>
            </div>
            <div class="swiper-slide" data-id="2">
                <img src="person2.jpg" alt="万小松">
                <div class="slide-overlay"></div>
                <div class="name-badge">万小松</div>
            </div>
            <div class="swiper-slide" data-id="3">
                <img src="person3.jpg" alt="孔繁慧">
                <div class="slide-overlay"></div>
                <div class="name-badge">孔繁慧</div>
            </div>
        </div>
    </div>

    <div class="hint">👈 左右滑动选择人物，双击查看详情 👉</div>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <a href="javascript:void(0)" class="close-btn" id="closeBtn">&times;</a>
            <h2 id="modalName">名字</h2>
            <p id="modalDesc">介绍内容...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const personsData = {
            "1": { name: "包娜巧", desc: "包娜巧，女，中共党员..." },
            "2": { name: "万小松", desc: "万小松，男，土家族..." },
            "3": { name: "孔繁慧", desc: "孔繁慧，副教授..." }
        };

        const swiper = new Swiper(".mySwiper", {
            slidesPerView: 1.2,
            centeredSlides: true,
            spaceBetween: 8,
            loop: true,
            loopedSlides: 3,
            speed: 400,
            grabCursor: true,
            touchRatio: 1.5,
            keyboard: { enabled: true },
            effect: 'slide',
        });

        const modal = document.getElementById('infoModal');
        const modalName = document.getElementById('modalName');
        const modalDesc = document.getElementById('modalDesc');
        const closeBtn = document.getElementById('closeBtn');

        function getRealId() {
            const activeSlide = swiper.slides[swiper.activeIndex];
            if (activeSlide) {
                return activeSlide.getAttribute('data-id');
            }
            return null;
        }

        function openModal(id) {
            const data = personsData[id];
            if (!data) return;
            modalName.innerText = data.name;
            modalDesc.innerText = data.desc;
            modal.classList.remove('hiding');
            modal.classList.add('show');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            modal.classList.add('hiding');
            document.body.classList.remove('modal-open');
            setTimeout(() => {
                modal.classList.remove('show', 'hiding');
            }, 250);
        }

        closeBtn.addEventListener('click', closeModal);

        modal.addEventListener('click', function (e) {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && modal.classList.contains('show')) closeModal();
        });

        const slidesContainer = document.querySelector('.swiper-wrapper');

        slidesContainer.addEventListener('dblclick', function (e) {
            const targetSlide = e.target.closest('.swiper-slide');
            if (targetSlide && targetSlide.classList.contains('swiper-slide-active')) {
                openModal(getRealId());
            }
        });

        let lastTapTime = 0;
        let lastTapTarget = null;
        slidesContainer.addEventListener('touchend', function (e) {
            const targetSlide = e.target.closest('.swiper-slide');
            if (!targetSlide || !targetSlide.classList.contains('swiper-slide-active')) return;

            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            if (tapLength < 350 && tapLength > 0 && lastTapTarget === targetSlide) {
                openModal(getRealId());
                e.preventDefault();
                lastTapTime = 0;
                lastTapTarget = null;
            } else {
                lastTapTime = currentTime;
                lastTapTarget = targetSlide;
            }
        });
    </script>
</body>
</html>
